<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Anggota - EDUTRAIL LIBRARY</title>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* CSS Menggunakan Variable yang sama dengan Login untuk Konsistensi */
        :root {
            --primary: #6b4527;
            --secondary: #c8a97e;
            --dark: #3a2416;
            --light: #f7efe6;
            --black-coffee: #1a100a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--light) 0%, #e6d5c3 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 15px 5%;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, var(--dark), var(--black-coffee));
            color: white;
        }

        .back-btn { color: var(--secondary); text-decoration: none; display: flex; align-items: center; gap: 8px; font-size: 14px; }

        .reg-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .reg-box {
            background: white;
            width: 100%;
            max-width: 500px; /* Lebih lebar sedikit dari login */
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(58, 36, 22, 0.15);
        }

        .reg-header { text-align: center; margin-bottom: 30px; }
        .reg-header h2 { color: var(--dark); font-size: 24px; font-weight: 700; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group { margin-bottom: 15px; }
        .full-width { grid-column: span 2; }

        label { display: block; font-size: 11px; font-weight: 600; color: var(--primary); margin-bottom: 5px; text-transform: uppercase; }

        input, select {
            width: 100%;
            padding: 10px 15px;
            border-radius: 10px;
            border: 1.5px solid #eee;
            font-family: inherit;
            outline: none;
            font-size: 14px;
        }

        input:focus { border-color: var(--secondary); }

        .terms {
            font-size: 12px;
            color: #777;
            margin: 15px 0;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .terms input { width: auto; margin-top: 3px; }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--secondary), #b48a5a);
            color: var(--dark);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }

        .footer-link { text-align: center; margin-top: 20px; font-size: 14px; }
        .footer-link a { color: var(--primary); font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>

<header>
    <a href="login.html" class="back-btn">
        <span class="material-icons">arrow_back</span> Kembali Login
    </a>
</header>

<div class="reg-container">
    <div class="reg-box">
        <div class="reg-header">
            <h2>Pendaftaran Anggota</h2>
            <p style="font-size: 13px; color: #888;">Bergabunglah dengan komunitas literasi digital kami</p>
        </div>

        <form action="#">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Nama Lengkap</label>
                    <input type="text" placeholder="Sesuai kartu identitas" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="email@contoh.com" required>
                </div>
                <div class="form-group">
                    <label>No. WhatsApp</label>
                    <input type="tel" placeholder="0812..." required>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" placeholder="User123" required>
                </div>
                <div class="form-group">
                    <label>Pekerjaan</label>
                    <select>
                        <option>Mahasiswa</option>
                        <option>Pelajar</option>
                        <option>Umum</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Kata Sandi</label>
                    <input type="password" placeholder="Minimal 8 karakter" required>
                </div>
                <div class="form-group">
                    <label>Konfirmasi Sandi</label>
                    <input type="password" placeholder="Ulangi sandi" required>
                </div>
            </div>

            <div class="terms">
                <input type="checkbox" required>
                <span>Saya setuju dengan Syarat & Ketentuan serta Kebijakan Privasi Edutrail Library.</span>
            </div>

            <button type="submit">DAFTAR SEKARANG</button>
        </form>

        <div class="footer-link">
            Sudah punya akun? <a href="login.html">Masuk di sini</a>
        </div>
    </div>
</div>

</body>
</html>
