<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EDUTRAIL LIBRARY</title>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6b4527;
            --secondary: #c8a97e;
            --dark: #3a2416;
            --light: #f7efe6;
            --black-coffee: #1a100a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--light) 0%, #e6d5c3 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== HEADER ===== */
        header {
            padding: 15px 5%;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, var(--dark), var(--black-coffee));
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .back-btn {
            color: var(--secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: 0.3s;
        }

        .back-btn:hover { color: white; }

        header h1 {
            flex-grow: 1;
            text-align: center;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-right: 80px; /* Offset for back button balance */
        }

        /* ===== LOGIN CONTAINER ===== */
        .login-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-box {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(58, 36, 22, 0.15);
            border: 1px solid rgba(200, 169, 126, 0.2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header img {
            width: 60px;
            margin-bottom: 15px;
            border-radius: 50%;
            border: 2px solid var(--secondary);
        }

        .login-header h2 {
            color: var(--dark);
            font-size: 24px;
            font-weight: 700;
        }

        .login-header p {
            font-size: 13px;
            color: #888;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 12px;
            color: var(--secondary);
            font-size: 20px;
        }

        input {
            width: 100%;
            padding: 12px 15px 12px 42px;
            border-radius: 12px;
            border: 1.5px solid #eee;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(200, 169, 126, 0.1);
        }

        .toggle-pass {
            position: absolute;
            right: 12px;
            cursor: pointer;
            color: #999;
            transition: 0.3s;
        }

        .toggle-pass:hover { color: var(--primary); }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 8px 15px rgba(107, 69, 39, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(107, 69, 39, 0.3);
        }

        .footer-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">
        <span class="material-icons">arrow_back</span> Kembali
    </a>
    <h1>Edutrail Library</h1>
</header>

<div class="login-container">
    <div class="login-box">
        <div class="login-header">
            <img src="logo.png" alt="Logo">
            <h2>Selamat Datang</h2>
            <p>Silakan masuk ke akun literasi Anda</p>
        </div>

        <form action="#">
            <div class="form-group">
                <label>Username / Email</label>
                <div class="input-wrapper">
                    <i class="material-icons">person_outline</i>
                    <input type="text" placeholder="Masukkan username" required>
                </div>
            </div>

            <div class="form-group">
                <label>Kata Sandi</label>
                <div class="input-wrapper">
                    <i class="material-icons">lock_outline</i>
                    <input type="password" id="password" placeholder="Masukkan password" required>
                    <span class="material-icons toggle-pass" onclick="togglePassword()">visibility_off</span>
                </div>
            </div>

            <button type="submit">MASUK KE PERPUSTAKAAN</button>
        </form>

        <div class="footer-link">
            Belum menjadi anggota? <br>
            <a href="daftar.html">Daftar Keanggotaan Baru</a>
        </div>
    </div>
</div>

<script>
    function togglePassword() {
        const passwordField = document.getElementById("password");
        const icon = document.querySelector(".toggle-pass");
        if (passwordField.type === "password") {
            passwordField.type = "text";
            icon.textContent = "visibility";
        } else {
            passwordField.type = "password";
            icon.textContent = "visibility_off";
        }
    }
</script>

</body>
</html>
